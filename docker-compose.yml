version: '3.9'

services:
  # ----------------------------------------
  # Backend API Service (Node.js/Express/TypeScript)
  # ----------------------------------------
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
      # target: development # <--- CRITICAL FIX 1: Ensures 'ts-node-dev' is installed.
    container_name: referral-backend
    restart: on-failure
    ports:
      - "5000:5000" 
    
    env_file:
      - ./.env
      
    # Volumes for development:
    volumes:
      # Mount the source code for HMR
      - .:/app 
      # Anonymous Volume: Use node_modules installed *inside* the container
      - /app/node_modules 
      
    command: npm run dev
